<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        .page-layout { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 40px 20px; }
        .form-panel { width: 80%; max-width: 1000px; padding: 30px; background: linear-gradient(to bottom, #4a90e2, #357ABD); color: #fff; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .form-panel h2 { margin-top: 0; margin-bottom: 20px; font-size: 2em; text-align: center; }
        .back-btn { display: inline-block; margin-bottom: 20px; padding: 6px 12px; background: rgba(255,255,255,0.2); color: #fff; text-decoration: none; border-radius: 4px; font-weight: bold; transition: background 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.35); }
        .form-card { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px 30px; }
        .form-card label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-card input, .form-card select { width: 100%; padding: 8px 10px; border: none; border-radius: 4px; font-size: 0.95em; }
        .form-card input:focus, .form-card select:focus { outline: none; box-shadow: 0 0 0 2px rgba(255,255,255,0.5); }
        .form-card button { grid-column: 1 / -1; padding: 12px; background: #fff; color: #357ABD; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; transition: background 0.3s, color 0.3s; margin-top: 10px; }
        .form-card button:hover { background: #357ABD; color: #fff; }
        #formMessage { grid-column: 1 / -1; margin-top: 10px; font-weight: bold; text-align: center; }
        #formMessage.success { color: #00ff7f; }
        #formMessage.error { color: #ff4c4c; }
    </style>
</head>
<body>

<div class="page-layout">
    <div class="form-panel">
        <a href="/" class="back-btn">⬅ Back to Dashboard</a>
        <h2>➕ Add Single Product</h2>

        <form id="addProductForm" class="form-card">
            <!-- Existing fields -->
            <div>
                <label>Item Name</label>
                <input type="text" name="item" id="itemName" required>
            </div>
            <div>
                <label>Vendor</label>
                <select id="vendor" name="vendor" required>
                    <option value="">Select a vendor</option>
                </select>
            </div>
            <div>
                <label>Color</label>
                <input type="text" name="color">
            </div>
            <div>
                <label>Warehouse Location</label>
                <select name="whs_location" required>
                    <option value="MAIN WHS">MAIN WHS</option>
                    <option value="STORE WHS">STORE WHS</option>
                    <option value="ALT WHS">ALT WHS</option>
                    <option value="DISTRIBUTION CENTER">DISTRIBUTION CENTER</option>
                </select>
            </div>
            <div>
                <label>Lot Type</label>
                <select name="lot_type" required>
                    <option value="CLOT">CLOT</option>
                    <option value="ALOT">ALOT</option>
                    <option value="BLOT">BLOT</option>
                    <option value="9000">9000</option>
                    <option value="Miscelaneous">Miscelaneous</option>
                </select>
            </div>

            <!-- New fields for costing -->
            <div>
                <label>Cost per Unit</label>
                <input type="number" step="0.01" name="cost" id="productCost" required>
            </div>
            <div>
                <label>Initial Quantity</label>
                <input type="number" name="initial_qty" id="productQty" min="0" required>
            </div>
    
            <div>
                <label>Received At</label>
                <input type="datetime-local" name="received_at" id="receivedAt">
            </div>

            <div>
                <label>PO (Purchase Order)</label>
                <input type="text" name="po" placeholder="Enter PO number">
            </div>
            
            <div>
                <label>Freight (%)</label>
                <input type="number" step="0.01" name="freight" id="productFreight" value="0">
            </div>
            <div>
                <label>Extended Cost</label>
                <input type="number" step="0.01" id="productExtendedCost" readonly>
            </div>

            <div>
                <label>Description</label>
                <input type="text" name="description">
            </div>

            <button type="submit">💾 Save Product</button>
            <p id="formMessage"></p>
        </form>
    </div>
</div>

<script>
    // ------------------------------
    // Vendor Dropdown Loader
    // ------------------------------
    async function loadVendors() {
        try {
            const res = await fetch("/api/vendors/");
            if (!res.ok) throw new Error(`Failed to fetch vendors: ${res.status}`);
            const vendors = await res.json();
            const select = document.getElementById("vendor");
            select.innerHTML = `<option value="">Select a vendor</option>`;
            vendors.forEach(v => {
                const option = document.createElement("option");
                option.value = v.code;
                option.textContent = v.name;
                select.appendChild(option);
            });
        } catch (err) {
            console.error(err);
            alert("Failed to load vendors. Check console.");
        }
    }

    // ------------------------------
    // SKU Generation
    // ------------------------------
    async function generateSKU(vendor, item) {
        if (!vendor || !item) return "";
        try {
            const res = await fetch("/api/products/generate-sku", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ vendor, item })
            });
            if (!res.ok) throw new Error("Failed to generate SKU");
            const data = await res.json();
            return data.sku || "";
        } catch (err) {
            console.error(err);
            return "";
        }
    }
    
    // ------------------------------
    // 
    // Auto-fill Received Date
    // ------------------------------
    function setDefaultReceivedDate() {
        const input = document.getElementById("receivedAt");
        if (!input) return;

        const now = new Date();
        const offset = now.getTimezoneOffset();
        const local = new Date(now.getTime() - (offset * 60000));
        input.value = local.toISOString().slice(0, 16);
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadVendors();
        setDefaultReceivedDate();
    });

    // ------------------------------
    // Extended Cost Calculation
    // ------------------------------
    const costInput = document.getElementById("productCost");
    const qtyInput = document.getElementById("productQty");
    const freightInput = document.getElementById("productFreight");
    const extendedInput = document.getElementById("productExtendedCost");

    function updateExtendedCost() {
        const cost = parseFloat(costInput.value) || 0;
        const qty = parseInt(qtyInput.value) || 0;
        const freightPercent = parseFloat(freightInput.value) || 0;
        extendedInput.value = ((cost * qty) * (1 + freightPercent / 100)).toFixed(2);
    }

    costInput.addEventListener("input", updateExtendedCost);
    qtyInput.addEventListener("input", updateExtendedCost);
    freightInput.addEventListener("input", updateExtendedCost);
    
    // ------------------------------
    // Form Submission
    // ------------------------------
    document.getElementById("addProductForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const form = e.target;
        const message = document.getElementById("formMessage");

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        // Convert numeric fields
        data.cost = Number(data.cost);
        data.initial_qty = Number(data.initial_qty);
        data.freight = Number(data.freight);
        data.extended_cost = Number(extendedInput.value);
        data.sale_price = Number(data.sale_price || 0);

        // Generate SKU if missing
        if (!data.sku) {
            data.sku = await generateSKU(data.vendor, data.item);
        }

        try {
            const res = await fetch("/api/products", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error || "Failed to create product");
            }
            message.textContent = "✅ Product created successfully!";
            message.className = "success";
            form.reset();
            extendedInput.value = "";
            loadVendors();
        } catch (err) {
            message.textContent = "❌ " + err.message;
            message.className = "error";
        }
    });

    // ------------------------------
    // SKU generation on vendor/item changes
    // ------------------------------
    document.getElementById("vendor").addEventListener("change", async () => {
        const vendor = document.getElementById("vendor").value;
        const item = document.getElementById("itemName").value.trim();
        if (vendor && item) await generateSKU(vendor, item);
    });
    document.getElementById("itemName").addEventListener("blur", async () => {
        const vendor = document.getElementById("vendor").value;
        const item = document.getElementById("itemName").value.trim();
        if (vendor && item) await generateSKU(vendor, item);
    });

    // ------------------------------
    // Uppercase transformation
    // ------------------------------
    document.addEventListener("input", function(e) {
        if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") {
            if (e.target.type === "text" || e.target.tagName === "TEXTAREA") {
                e.target.value = e.target.value.toUpperCase();
            }
        }
    });

    // ------------------------------
    // Load vendors on page load
    // ------------------------------
    document.addEventListener("DOMContentLoaded", loadVendors);
</script>

</body>
</html>
