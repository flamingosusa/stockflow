<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload PO</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom,  #1E3A8A, #CBD5E1);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .form-panel {
            width: 500px;
            padding: 30px;
            background: linear-gradient(to bottom, #4a90e2, #357ABD);
            color: #fff;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="file"] {
            width: 100%;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #357ABD;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #357ABD;
            color: #fff;
        }
        #formMessage {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
        #formMessage.success { color: #00ff7f; }
        #formMessage.error { color: #ff4c4c; }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="form-panel">
    <a href="/" class="back-btn">⬅ Back to Dashboard</a>
    <h2>📄 Upload Purchase Order</h2>

    <form id="uploadPOForm">
        <label for="file">Select Excel File (.xls/.xlsx)</label>
        <input type="file" id="file" name="file" accept=".xls,.xlsx" required>
        <button type="submit">Upload PO</button>
    </form>

    <p id="formMessage"></p>
</div>

<script>
document.getElementById("uploadPOForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    const message = document.getElementById("formMessage");
    message.textContent = "";
    message.className = "";

    const fileInput = document.getElementById("file");
    if (!fileInput.files.length) {
        message.textContent = "❌ Please select a file";
        message.className = "error";
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try {
        const res = await fetch("/add-product/upload-po", {
            method: "POST",
            body: formData
        });

        const result = await res.json(); // parse JSON

        if (!res.ok) {
            throw new Error(result.error || "Upload failed");
        }

        message.textContent = `✅ ${result.status} (${result.rows_inserted} rows inserted)`;
        message.className = "success";
        fileInput.value = ""; // reset input

    } catch (err) {
        message.textContent = "❌ " + err.message;
        message.className = "error";
    }
});
</script>

</body>
</html>
