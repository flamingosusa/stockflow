<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Sale</title>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f5f5f5;
    }

    h2 {
        margin-bottom: 15px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
    }

    th, td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
    }

    th {
        background: #eee;
    }

    input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px;
    }

    .actions {
        margin-top: 15px;
        display: flex;
        gap: 10px;
    }

    button {
        padding: 10px 16px;
        cursor: pointer;
        border: none;
    }

    .cancel {
        background: #ccc;
    }

    .save {
        background: #4caf50;
        color: white;
    }
</style>
</head>

<body>

<h2>Edit Sale</h2>

<table>
    <thead>
        <tr>
            <th>Invoice</th>
            <th>Date</th>
            <th>Customer</th>
            <th>Phone</th>
            <th>Delivery Fee</th>
            <th>Tax</th>
            <th>Total</th>
        </tr>
    </thead>
    <tbody id="saleRow"></tbody>
</table>

<div class="actions">
    <button class="save" onclick="saveSale()">Save Changes</button>
    <button class="cancel" onclick="goBack()">Cancel</button>
</div>

<script>
/* =============================
   BOOTSTRAP
============================= */
const params = new URLSearchParams(window.location.search);
const invoiceNumber = params.get("invoice");

if (!invoiceNumber) {
    alert("Missing invoice number");
    throw new Error("invoice missing from URL");
}

let currentSale = null;

/* =============================
   LOAD SALE
============================= */
async function loadSale() {
    const res = await fetch(`/api/sales/${encodeURIComponent(invoiceNumber)}`);
    if (!res.ok) {
        alert("Failed to load sale");
        return;
    }

    const data = await res.json();
    currentSale = data.sale;

    renderSale();
}

/* =============================
   RENDER
============================= */
function renderSale() {
    const row = `
        <tr>
            <td>${currentSale.invoice_number}</td>
            <td>
                <input id="sale_date" value="${currentSale.sale_date || ""}">
            </td>
            <td>
                <input id="customer_name" value="${currentSale.customer_name || ""}">
            </td>
            <td>
                <input id="phone" value="${currentSale.phone1 || ""}">
            </td>
            <td>
                <input id="delivery_fee" type="number" step="0.01"
                       value="${currentSale.delivery_fee || 0}">
            </td>
            <td>
                <input id="tax_amount" type="number" step="0.01"
                       value="${currentSale.tax_amount || 0}">
            </td>
            <td>
                $${Number(currentSale.total || 0).toFixed(2)}
            </td>
        </tr>
    `;

    document.getElementById("saleRow").innerHTML = row;
}

/* =============================
   SAVE
============================= */
async function saveSale() {
    const payload = {
        sale_date: document.getElementById("sale_date").value,
        customer_name: document.getElementById("customer_name").value,
        phone1: document.getElementById("phone").value,
        delivery_fee: parseFloat(document.getElementById("delivery_fee").value) || 0,
        tax_amount: parseFloat(document.getElementById("tax_amount").value) || 0
    };

    const res = await fetch(`/api/sales/${encodeURIComponent(invoiceNumber)}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    if (res.ok) {
        alert("Sale updated successfully");
        window.location.href = "/review_sales";
    } else {
        alert("Failed to update sale");
    }
}

/* =============================
   NAV
============================= */
function goBack() {
    window.location.href = "/review_sales";
}

document.addEventListener("DOMContentLoaded", loadSale);
    
document.addEventListener("input", function(e) {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") {
        if (e.target.type === "text" || e.target.tagName === "TEXTAREA") {
            e.target.value = e.target.value.toUpperCase();
        }
    }
});
</script>

</body>
</html>
