<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Sales Person</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

<style>

/* ===== Base ===== */
body {
    font-family: "Segoe UI", Tahoma, sans-serif;
    background: linear-gradient(to bottom, #1E3A8A, #4A90E2);
    min-height: 100vh;
    padding: 40px 20px;
    color: #fff;
}

/* ===== Card ===== */
.card {
    max-width: 600px;
    margin: auto;
    background: linear-gradient(to bottom, #357ABD, #4A90E2);
    border-radius: 14px;
    padding: 30px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.35);
}

/* ===== Header ===== */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.header h2 {
    margin: 0;
}

.back-btn {
    background: rgba(255,255,255,0.9);
    color: #357ABD;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

.back-btn:hover {
    background: #357ABD;
    color: #fff;
}

/* ===== Form ===== */
.form-box {
    background: rgba(255,255,255,0.12);
    padding: 20px;
    border-radius: 10px;
}

.form-group {
    margin-bottom: 18px;
}

label {
    display: block;
    margin-bottom: 6px;
    font-weight: bold;
}

input {
    width: 90%;
    padding: 10px 12px;
    border-radius: 6px;
    border: none;
    font-size: 14px;
}

/* ===== Button ===== */
.submit-btn {
    width: 95%;
    background: #fff;
    color: #357ABD;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
}

.submit-btn:hover {
    background: #1E3A8A;
    color: #fff;
}

.message {
    margin-top: 15px;
    font-weight: bold;
}

.success { color: #4ade80; }
.error { color: #f87171; }

</style>
</head>

<body>

<div class="card">

    <div class="header">
        <h2>🧑 Add Sales Person</h2>
        <button class="back-btn" onclick="location.href='/'">⬅ Dashboard</button>
    </div>

    <div class="form-box">

        <form id="salesPersonForm">

            <div class="form-group">
                <label>Sales Person ID</label>
                <input type="text" id="salesPersonId" placeholder="Example: 101" required>
            </div>

            <div class="form-group">
                <label>Sales Person Name</label>
                <input type="text" id="salesPersonName" placeholder="Example: JOHN SMITH" required>
            </div>

            <button class="submit-btn" type="submit">
                ➕ Add Sales Person
            </button>

        </form>

        <div id="message" class="message"></div>

    </div>

</div>

<script>

document.getElementById("salesPersonForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const sales_person_id = document.getElementById("salesPersonId").value.trim();
    const name = document.getElementById("salesPersonName").value.trim();

    const msg = document.getElementById("message");
    msg.innerHTML = "";

    try{

        const res = await fetch("/api/sales-people", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                sales_person_id: sales_person_id,
                name: name
            })
        });

        const data = await res.json();

        if(res.ok){

            msg.innerHTML = "✔ Sales person added successfully";
            msg.className = "message success";

            document.getElementById("salesPersonForm").reset();

        }else{

            msg.innerHTML = data.error || "Error adding sales person";
            msg.className = "message error";

        }

    }catch(err){

        msg.innerHTML = "Server error";
        msg.className = "message error";

    }

});

/* AUTO UPPERCASE INPUTS */
document.addEventListener("input", function(e) {
    if (e.target.tagName === "INPUT") {
        e.target.value = e.target.value.toUpperCase();
    }
});

</script>

</body>
</html>
