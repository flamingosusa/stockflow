<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Sale</title>
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to bottom, #1E3A8A, #CBD5E1);
    min-height: 100vh;
    padding: 40px 20px;
}
.sale-card {
    max-width: 1200px;
    margin: auto;
    padding: 30px 40px;
    background: linear-gradient(to bottom, #4a90e2, #357ABD);
    color: #fff;
    border-radius: 14px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.35);
}
h2 { text-align: center; margin-bottom: 25px; }
label { font-weight: 600; display: block; margin-bottom: 5px; }
input, textarea, select { width: 80%; padding: 10px; border-radius: 6px; border: none; font-size: 14px; }
textarea { resize: vertical; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.toggle-group { display: flex; gap: 10px; }
.toggle-btn { flex:1; padding:10px; border-radius:6px; border:none; font-weight:bold; cursor:pointer; background:#fff; color:#357ABD; }
.toggle-btn.active { background:#357ABD; color:#fff; }
table { width:100%; border-collapse:collapse; margin-top:25px; background: rgba(255,255,255,0.15); border-radius:10px; }
th, td { padding:12px; }
th { background: rgba(0,0,0,0.2); }
.btn { padding: 8px 14px; border-radius:6px; border:none; cursor:pointer; font-weight:bold; }
.btn-add { background:#fff; color:#357ABD; margin-top:15px; }
.btn-remove { background:#ef4444; color:#fff; }
.total-box { text-align:right; margin-top:20px; font-size:20px; font-weight:bold; }
.actions { text-align:center; margin-top:30px; }
.submit { width:50%; padding:14px; background:#fff; color:#357ABD; font-weight:bold; border-radius:8px; cursor:pointer; }
.back-btn { background: rgba(255,255,255,0.9); color:#357ABD; border:none; padding:8px 14px; border-radius:6px; font-weight:bold; cursor:pointer; }
.back-btn:hover { background:#357ABD; color:#fff; }
</style>
</head>
<body>
<div class="sale-card">
<button class="back-btn" onclick="location.href='/'">← Back to Dashboard</button>
<h2>🧾 New Sale</h2>

<form id="saleForm">
<div class="grid">
    <div><label>Invoice #</label><input type="text" required></div>
    <div><label>Sale Date</label><input type="date" required></div>
    <div><label>Delivery / Pickup Date</label><input type="date"></div>
    <div><label>Customer Name</label><input type="text" required></div>
    <div><label>Email</label><input type="email"></div>
    <div><label>Address</label><input type="text"></div>
    <div><label>Phone #1</label><input type="text"></div>
    <div><label>Phone #2</label><input type="text"></div>
    <div>
        <label>Sale Type</label>
        <div class="toggle-group">
            <button type="button" class="toggle-btn active" data-value="Delivery">Delivery</button>
            <button type="button" class="toggle-btn" data-value="Pickup">Pickup</button>
        </div>
        <input type="hidden" id="saleType" value="Delivery">
    </div>
    <div><label>Salesperson</label><input type="text"></div>
    <div>
        <label>Status</label>
        <select>
            <option>Pending</option>
            <option>Completed</option>
            <option>Cancelled</option>
        </select>
    </div>
    <div style="grid-column: span 1;">
        <label>Notes</label>
        <textarea rows="1"></textarea>
    </div>
</div>

<table id="productsTable">
<thead>
<tr>
    <th>Item</th>
    <th>Vendor</th>
    <th>Description</th>
    <th>SKU</th>
    <th>Color</th>
    <th>Qty</th>
    <th>Price</th>
    <th>Total</th>
    <th>Actions</th>
    <th></th>
</tr>
</thead>
<tbody></tbody>
</table>
    
<button type="button" class="btn btn-add" onclick="addRow()">+ Add Product</button>
<!-- Add this inside your <form id="saleForm">, below your products table and add product button -->

<div class="grid" style="margin-top:20px;">
    <div><label>Tax %</label><input type="number" id="taxPercent" value="0" step="0.01" min="0"></div>
    <div><label>Delivery Fee</label><input type="number" id="deliveryFee" value="0" step="0.01" min="0"></div>
</div>


<div class="total-box">Invoice Total: $<span id="invoiceTotal">0.00</span></div>
<div class="actions"><button class="submit" type="submit">Save Sale</button></div>
</form>
</div>

<script>
let products = [];

async function loadProducts() {
    const res = await fetch("/api/products");
    products = await res.json();
}

function addRow() {
    const row = document.createElement("tr");
    const options = products.map(p => 
        `<option value="${p.id}" data-vendor="${p.vendor || ''}" data-sku="${p.sku}" data-description="${p.description || ''}" data-color="${p.color}" data-price="${p.sale_price || 0}">${p.item}</option>`
    ).join("");

    row.innerHTML = `
        <td><select onchange="fillProduct(this)"><option value="">Select product</option>${options}</select>
    </td>
        <td><input readonly></td>
        <td><input readonly></td>
        <td><input readonly></td>
        <td><input readonly></td>
        <td><input type="number" min="1" value="1" oninput="calc()"></td>
        <td><input type="number" step="0.01" value="0" oninput="calc()"></td>
        <td class="line-total">0.00</td>
        <td><button type="button" class="btn btn-remove" onclick="this.closest('tr').remove(); calc()">X</button></td>
    `;
    document.querySelector("#productsTable tbody").appendChild(row);
}

function fillProduct(select) {
    const opt = select.selectedOptions[0];
    const row = select.closest("tr");
    row.children[1].children[0].value = opt.dataset.vendor || "";
    row.children[2].children[0].value = opt.dataset.description || "";
    row.children[3].children[0].value = opt.dataset.sku || "";
    row.children[4].children[0].value = opt.dataset.color || "";
    row.children[6].children[0].value = opt.dataset.price || 0;
    calc();
}

function calc() {
    let subtotal = 0;

    document.querySelectorAll("#productsTable tbody tr").forEach(row => {
        const qty = Number(row.children[5].children[0].value || 0);
        const price = Number(row.children[6].children[0].value || 0);
        const line = qty * price;
        row.children[7].textContent = line.toFixed(2);
        subtotal += line;
    });

    const taxPercent = Number(document.getElementById("taxPercent").value || 0);
    const deliveryFee = Number(document.getElementById("deliveryFee").value || 0);
    const taxAmount = subtotal * taxPercent / 100;
    const total = subtotal + taxAmount + deliveryFee;

    document.getElementById("invoiceTotal").textContent = total.toFixed(2);
}

// live updates for tax & delivery
document.getElementById("taxPercent").oninput = calc;
document.getElementById("deliveryFee").oninput = calc;

// sale type toggle
document.querySelectorAll(".toggle-btn").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("saleType").value = btn.dataset.value;
    };
});

loadProducts();

document.getElementById("saleForm").addEventListener("submit", async e => {
    e.preventDefault();

    const sale = {
        invoice_number: document.querySelector("input[type='text']").value,
        sale_date: document.querySelector("input[type='date']").value,
        delivery_date: document.querySelectorAll("input[type='date']")[1].value,
        customer_name: document.querySelectorAll("input[type='text']")[1].value,
        email: document.querySelector("input[type='email']").value,
        address: document.querySelectorAll("input[type='text']")[2].value,
        phone1: document.querySelectorAll("input[type='text']")[3].value,
        phone2: document.querySelectorAll("input[type='text']")[4].value,
        sale_type: document.getElementById("saleType").value,
        salesperson: document.querySelectorAll("input[type='text']")[5].value,
        status: document.querySelector("select").value,
        notes: document.querySelector("textarea").value,
        total: Number(document.getElementById("invoiceTotal").textContent),
        tax_percent: Number(document.getElementById("taxPercent").value || 0),
        delivery_fee: Number(document.getElementById("deliveryFee").value || 0),
        items: []
    };

    document.querySelectorAll("#productsTable tbody tr").forEach(row => {
        sale.items.push({
            product_id: row.children[0].children[0].value,
            item: row.children[0].children[0].selectedOptions[0].text,
            vendor: row.children[1].children[0].value,
            description: row.children[2].children[0].value,
            sku: row.children[3].children[0].value,
            color: row.children[4].children[0].value,
            qty: Number(row.children[5].children[0].value),
            price: Number(row.children[6].children[0].value),
            line_total: Number(row.children[7].textContent)
        });
    });

    const res = await fetch("/api/sales", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(sale)
    });

    const result = await res.json();
    if (res.ok) {
        alert("✅ Sale saved successfully");
        window.location.href = "/";
    } else {
        alert("❌ " + result.error);
    }
});
</script>


</body>
</html>
